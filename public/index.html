<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chinra — Home</title>
    <meta name="description" content="Chinra Home Dashboard" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/style.css" />
    <link rel="stylesheet" href="/assets/home.css" />
  </head>
  <body class="home-body">
    <!-- Top Navigation (optional) -->
    <nav class="home-nav">
      <div class="logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">Chinra</span>
      </div>
      <a href="/dashboard.html" class="btn primary small">Go to Dashboard</a>
    </nav>

    <main class="home-main">
      <!-- Moving Pictures Marquee -->
      <section class="marquee-section">
        <div class="marquee-container" id="marquee-container">
          <div class="marquee-content" id="marquee-content">
            <!-- Marquee images injected here -->
          </div>
        </div>
      </section>

      <!-- Albums Section -->
      <section class="albums-section">
        <h2 class="section-title">Albums</h2>
        <div class="albums-grid" id="albums-grid">
          <!-- Album circles injected here -->
        </div>
      </section>

      <!-- Video Grid Section -->
      <section class="videos-section">
        <h2 class="section-title">Videos</h2>
        <div class="video-grid" id="video-grid">
          <!-- Videos injected here -->
        </div>
      </section>
    </main>

    <!-- Video Lightbox (Reusing same style roughly) -->
    <div id="lightbox" class="lightbox hidden">
      <button id="lightbox-close" class="lightbox-close">✕</button>
      <div id="lightbox-content" class="lightbox-content"></div>
    </div>

    <script src="/assets/home.js"></script>
  </body>
</html>
