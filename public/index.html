<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chinra — Media Vault</title>
  <meta name="description" content="Personal media dashboard for managing R2 storage" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>

<!-- Upload Drop Overlay -->
<div id="drop-overlay" class="drop-overlay hidden">
  <div class="drop-overlay-inner">
    <div class="drop-icon">⬆</div>
    <p>Drop files to upload</p>
  </div>
</div>

<!-- Context Menu -->
<div id="ctx-menu" class="ctx-menu hidden">
  <button id="ctx-open"   class="ctx-item">🔍 Open / Preview</button>
  <button id="ctx-rename" class="ctx-item">✏️ Rename</button>
  <button id="ctx-move"   class="ctx-item">📂 Move to…</button>
  <button id="ctx-delete" class="ctx-item danger">🗑 Delete</button>
</div>

<!-- Modal Backdrop -->
<div id="modal-backdrop" class="modal-backdrop hidden"></div>

<!-- New Folder Modal -->
<div id="modal-mkdir" class="modal hidden">
  <div class="modal-box">
    <h2>New Folder</h2>
    <input id="mkdir-name" type="text" placeholder="Folder name…" autocomplete="off" />
    <div class="modal-actions">
      <button id="mkdir-cancel" class="btn ghost">Cancel</button>
      <button id="mkdir-confirm" class="btn primary">Create</button>
    </div>
  </div>
</div>

<!-- Rename Modal -->
<div id="modal-rename" class="modal hidden">
  <div class="modal-box">
    <h2>Rename</h2>
    <input id="rename-input" type="text" placeholder="New name…" autocomplete="off" />
    <div class="modal-actions">
      <button id="rename-cancel" class="btn ghost">Cancel</button>
      <button id="rename-confirm" class="btn primary">Rename</button>
    </div>
  </div>
</div>

<!-- Move Modal -->
<div id="modal-move" class="modal hidden">
  <div class="modal-box">
    <h2>Move to Folder</h2>
    <div id="move-folder-list" class="folder-list-picker"></div>
    <input id="move-custom-path" type="text" placeholder="Or type a path…" autocomplete="off" />
    <div class="modal-actions">
      <button id="move-cancel" class="btn ghost">Cancel</button>
      <button id="move-confirm" class="btn primary">Move Here</button>
    </div>
  </div>
</div>

<!-- Media Lightbox -->
<div id="lightbox" class="lightbox hidden">
  <button id="lightbox-close" class="lightbox-close">✕</button>
  <button id="lightbox-prev" class="lightbox-nav prev">‹</button>
  <div id="lightbox-content" class="lightbox-content"></div>
  <button id="lightbox-next" class="lightbox-nav next">›</button>
  <div id="lightbox-info" class="lightbox-info"></div>
</div>

<!-- App Shell -->
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">⬡</span>
      <span class="logo-text">Chinra</span>
    </div>

    <div class="sidebar-section">
      <span class="sidebar-label">Storage</span>
      <div id="folder-tree" class="folder-tree">
        <div class="folder-item root active" data-path="">
          <span class="folder-icon">🗄</span>
          <span>Root</span>
        </div>
      </div>
    </div>

    <div class="sidebar-bottom">
      <div id="storage-info" class="storage-info">
        <div class="storage-bar"><div id="storage-fill" class="storage-fill" style="width:0%"></div></div>
        <span id="storage-text">Loading…</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Topbar -->
    <header class="topbar">
      <div class="breadcrumbs" id="breadcrumbs">
        <span class="crumb active" data-path="">Root</span>
      </div>
      <div class="topbar-actions">
        <button id="btn-grid"   class="icon-btn active" title="Grid view">⊞</button>
        <button id="btn-list"   class="icon-btn" title="List view">≡</button>
        <button id="btn-mkdir"  class="btn ghost small">+ Folder</button>
        <label  id="btn-upload" class="btn primary small" for="file-input">↑ Upload</label>
        <input  id="file-input" type="file" multiple hidden />
      </div>
    </header>

    <!-- Upload Progress -->
    <div id="upload-queue" class="upload-queue hidden"></div>

    <!-- File Grid -->
    <section class="file-area" id="file-area">
      <div id="file-grid" class="file-grid"></div>
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-icon">🌌</div>
        <p>This folder is empty</p>
        <p class="empty-sub">Drop files here or click Upload</p>
      </div>
      <div id="loading-state" class="loading-state">
        <div class="spinner"></div>
      </div>
    </section>

  </main>
</div>

<script src="/assets/app.js"></script>
</body>
</html>
